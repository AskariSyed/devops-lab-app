---
- name: Configure EC2 host for Docker, Jenkins, and the app
  hosts: ec2
  become: true

  vars:
    app_repo_url: https://github.com/AskariSyed/devops-lab-app.git
    app_checkout_path: /opt/devops-lab-app
    container_name: devops-app
    image_name: devops-app:ansible

  pre_tasks:
    - name: Find existing Jenkins apt source files
      ansible.builtin.find:
        paths: /etc/apt/sources.list.d
        patterns: "*jenkins*"
        file_type: file
      register: jenkins_source_files

    - name: Remove stale Jenkins apt source files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ jenkins_source_files.files }}"

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
          - fontconfig
        state: present

    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Convert Docker key to keyring format
      ansible.builtin.command:
        cmd: gpg --dearmor --yes --output /etc/apt/keyrings/docker.gpg /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/ubuntu jammy stable
        filename: docker
        state: present

    - name: Add Adoptium GPG key
      ansible.builtin.get_url:
        url: https://packages.adoptium.net/artifactory/api/gpg/key/public
        dest: /etc/apt/keyrings/adoptium.asc
        mode: "0644"

    - name: Convert Adoptium key to keyring format
      ansible.builtin.command:
        cmd: gpg --dearmor --yes --output /etc/apt/keyrings/adoptium.gpg /etc/apt/keyrings/adoptium.asc
      args:
        creates: /etc/apt/keyrings/adoptium.gpg

    - name: Add Adoptium apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/adoptium.gpg]
          https://packages.adoptium.net/artifactory/deb {{ ansible_distribution_release }} main
        filename: adoptium
        state: present

    - name: Add Jenkins GPG key
      ansible.builtin.get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins-keyring.asc
        mode: "0644"

    - name: Convert Jenkins key to keyring format
      ansible.builtin.command:
        cmd: gpg --dearmor --yes --output /etc/apt/keyrings/jenkins-keyring.gpg /etc/apt/keyrings/jenkins-keyring.asc
      args:
        creates: /etc/apt/keyrings/jenkins-keyring.gpg

    - name: Add Jenkins apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/jenkins-keyring.gpg]
          https://pkg.jenkins.io/debian-stable binary/
        filename: jenkins
        state: present

    - name: Refresh apt cache after adding repos
      ansible.builtin.apt:
        update_cache: true

    - name: Install Docker and Jenkins
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
          - temurin-21-jdk
          - jenkins
        state: present

  tasks:
    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add jenkins to the docker group
      ansible.builtin.user:
        name: jenkins
        groups: docker
        append: true

    - name: Ensure Jenkins service is enabled and restarted
      ansible.builtin.service:
        name: jenkins
        state: restarted
        enabled: true

    - name: Add ubuntu to the docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_checkout_path }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Clone application repository
      ansible.builtin.git:
        repo: "{{ app_repo_url }}"
        dest: "{{ app_checkout_path }}"
        version: main
        force: true

    - name: Replace remote Dockerfile with the current workspace version
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../Dockerfile"
        dest: "{{ app_checkout_path }}/Dockerfile"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Replace remote requirements file with the current workspace version
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../requirements.txt"
        dest: "{{ app_checkout_path }}/requirements.txt"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Add a small dockerignore file
      ansible.builtin.copy:
        dest: "{{ app_checkout_path }}/.dockerignore"
        content: |
          .git
          __pycache__
          *.pyc
          terraform
          asnible
          .venv
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Prune unused Docker data before building the app image
      ansible.builtin.command:
        cmd: docker system prune -af

    - name: Remove any stale app image before rebuilding
      ansible.builtin.command:
        cmd: docker image rm -f {{ image_name }}
      register: remove_image_result
      failed_when: false
      changed_when: remove_image_result.rc == 0

    - name: Build the Docker image
      ansible.builtin.command:
        cmd: docker build -t {{ image_name }} .
        chdir: "{{ app_checkout_path }}"

    - name: Remove any existing app container
      ansible.builtin.command:
        cmd: docker rm -f {{ container_name }}
      register: remove_container_result
      failed_when: false
      changed_when: remove_container_result.rc == 0

    - name: Run the application container
      ansible.builtin.command:
        cmd: docker run -d --name {{ container_name }} -p 5000:5000 {{ image_name }}
